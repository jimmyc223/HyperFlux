# Firebase App Hosting backend configuration.
# https://firebase.google.com/docs/app-hosting/configure
#
# Notes:
# - The Firebase Admin SDK auto-uses Application Default Credentials on App
#   Hosting, so FIREBASE_PROJECT_ID / CLIENT_EMAIL / PRIVATE_KEY are NOT needed
#   here (those are only for local dev in .env.local).
# - NEXT_PUBLIC_* values are inlined at build time, so they need BUILD availability.
# - Secrets (Stripe keys) must be created in Cloud Secret Manager first:
#     firebase apphosting:secrets:set STRIPE_SECRET_KEY
#     firebase apphosting:secrets:set STRIPE_WEBHOOK_SECRET

runConfig:
  minInstances: 0
  maxInstances: 2

env:
  # --- Public Firebase client config (safe to expose; used by the login form) ---
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: REPLACE_WITH_FIREBASE_WEB_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: REPLACE_WITH_PROJECT.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: REPLACE_WITH_FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: REPLACE_WITH_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME

  # --- Existing contact-form key (already used by /support) ---
  - variable: NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY
    value: REPLACE_WITH_WEB3FORMS_ACCESS_KEY
    availability:
      - BUILD
      - RUNTIME

  # --- Admin allowlist (comma-separated emails permitted into /admin) ---
  - variable: ADMIN_ALLOWED_EMAILS
    value: REPLACE_WITH_ADMIN_EMAIL
    availability:
      - RUNTIME

  # --- Server secrets (create in Secret Manager, referenced by name) ---
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
